name: Codex Apply ETH Leveraged Site Patch

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/codex-apply-eth-leveraged-site-patch.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply site registry patch
        run: |
          python3 - <<'PY'
          from pathlib import Path

          route = Path('app/api/dashboard/route.ts')
          text = route.read_text()

          replacements = [
              (
                  "  ETH_MICRO_FUTURES_SENTIMENT_MODEL_ID,\n  BTC_LEVERAGED_ETF_SENTIMENT_MODEL_ID,",
                  "  ETH_MICRO_FUTURES_SENTIMENT_MODEL_ID,\n  ETH_LEVERAGED_ETF_SENTIMENT_MODEL_ID,\n  BTC_LEVERAGED_ETF_SENTIMENT_MODEL_ID,",
              ),
              (
                  "const RETIRED_MODEL_IDS = new Set([\n  ETH_LEVERAGED_ETF_SENTIMENT_MODEL_ID,\n  BTC_ETF_SENTIMENT_MODEL_ID,",
                  "const RETIRED_MODEL_IDS = new Set([\n  BTC_ETF_SENTIMENT_MODEL_ID,",
              ),
              (
                  "const ACCOUNT_BASELINE_MODEL_IDS = new Set<string>([\n  ETH_MICRO_FUTURES_SENTIMENT_MODEL_ID,\n  BTC_LEVERAGED_ETF_SENTIMENT_MODEL_ID,",
                  "const ACCOUNT_BASELINE_MODEL_IDS = new Set<string>([\n  ETH_MICRO_FUTURES_SENTIMENT_MODEL_ID,\n  ETH_LEVERAGED_ETF_SENTIMENT_MODEL_ID,\n  BTC_LEVERAGED_ETF_SENTIMENT_MODEL_ID,",
              ),
              (
                  "const RESET_SCOPED_ACCOUNT_MODEL_IDS = new Set<string>([\n  ETH_MICRO_FUTURES_SENTIMENT_MODEL_ID,\n  BTC_LEVERAGED_ETF_SENTIMENT_MODEL_ID,",
                  "const RESET_SCOPED_ACCOUNT_MODEL_IDS = new Set<string>([\n  ETH_MICRO_FUTURES_SENTIMENT_MODEL_ID,\n  ETH_LEVERAGED_ETF_SENTIMENT_MODEL_ID,\n  BTC_LEVERAGED_ETF_SENTIMENT_MODEL_ID,",
              ),
          ]

          for old, new in replacements:
              if old in text:
                  text = text.replace(old, new, 1)

          eth_model_block = """  {
            id: ETH_LEVERAGED_ETF_SENTIMENT_MODEL_ID,
            name: 'ETH Leveraged ETF Sentiment Alpha - Alpaca',
            description:
              'Live ETH leveraged ETF sentiment strategy using the ETH sentiment CryptoBERT/MLP/PPO artifact stack, ETHT/ETHD Alpaca paper execution, extended-hours limit orders, shock-override risk controls, and Alpaca paper-account telemetry.',
            repo: 'FinTechEntrepreneurldz/qsentia-eth-leveraged-etf-sentiment-alpha',
            logs_path: 'logs',
            branch: 'main',
            enabled: true,
            color: '#10b981',
            starting_capital: 1000000,
          },
          """.replace('          ', '')

          if "name: 'ETH Leveraged ETF Sentiment Alpha - Alpaca'" not in text:
              btc_anchor = "  {\n    id: BTC_LEVERAGED_ETF_SENTIMENT_MODEL_ID,"
              text = text.replace(btc_anchor, eth_model_block + btc_anchor, 1)

          route.write_text(text)

          catalog = Path('lib/modelCatalog.ts')
          catalog_text = catalog.read_text()
          if "'qsentia_eth_leveraged_etf_sentiment_alpha'" not in catalog_text:
              catalog_text = catalog_text.replace(
                  "  'qsentia_eth_micro_futures_sentiment_alpha',\n  'model_c_etf',",
                  "  'qsentia_eth_micro_futures_sentiment_alpha',\n  'qsentia_eth_leveraged_etf_sentiment_alpha',\n  'model_c_etf',",
                  1,
              )
          catalog.write_text(catalog_text)

          Path('.github/workflows/codex-apply-eth-leveraged-site-patch.yml').unlink(missing_ok=True)
          PY

      - name: Commit site registry patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/api/dashboard/route.ts lib/modelCatalog.ts .github/workflows/codex-apply-eth-leveraged-site-patch.yml
          if git diff --cached --quiet; then
            echo "No site registry changes to commit."
          else
            git commit -m "Add ETH leveraged ETF model to site"
            git push
          fi
